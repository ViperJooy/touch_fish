name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)
              sudo apt-get update -qq
              sudo apt-get install -y -qq upx
              ;;
            macos-latest)
              brew install upx
              ;;
            windows-latest)
              choco install upx -y
              ;;
          esac

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        env:
          PYTHONIOENCODING: utf-8
        run: python build.py

      - name: Show output size
        shell: bash
        run: |
          echo "=== Build output ==="
          ls -lh dist/
          if [ -f "dist/TouchFishGuard" ]; then
            wc -c < dist/TouchFishGuard | awk '{printf "Size: %.2f MB\n", $1/1048576}'
          fi
          if [ -f "dist/TouchFishGuard.exe" ]; then
            wc -c < dist/TouchFishGuard.exe | awk '{printf "Size: %.2f MB\n", $1/1048576}'
          fi
          if [ -d "dist/TouchFishGuard.app" ]; then
            du -sh dist/TouchFishGuard.app
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TouchFishGuard-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets

          # Linux
          cp TouchFishGuard-ubuntu-latest/TouchFishGuard release-assets/TouchFishGuard-linux-x86_64

          # macOS (.app is a directory, zip it for distribution)
          cd TouchFishGuard-macos-latest && zip -r ../release-assets/TouchFishGuard-macos-x86_64.zip TouchFishGuard.app && cd ..

          # Windows
          cp TouchFishGuard-windows-latest/TouchFishGuard.exe release-assets/TouchFishGuard-windows-x86_64.exe

          ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Touch Fish Guard ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release-assets/*
