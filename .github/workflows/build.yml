name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        env:
          PYTHONIOENCODING: utf-8
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TouchFishGuard-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          mv TouchFishGuard-ubuntu-latest/* release-assets/TouchFishGuard-linux-x86_64
          mv TouchFishGuard-macos-latest/* release-assets/TouchFishGuard-macos-x86_64
          mv TouchFishGuard-windows-latest/TouchFishGuard.exe release-assets/TouchFishGuard-windows-x86_64.exe
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Touch Fish Guard ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release-assets/*
